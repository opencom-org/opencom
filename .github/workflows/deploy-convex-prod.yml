name: Deploy Convex Production

on:
  push:
    branches:
      - "main"
  workflow_dispatch:

jobs:
  deploy-convex-prod:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    concurrency:
      group: deploy-convex-production
      cancel-in-progress: false
    env:
      # Required repository secret:
      # - CONVEX_DEPLOY_KEY: Production deploy key from Convex dashboard
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

    steps:
      - name: Checkout
        # actions/checkout pinned to v4.3.1: https://github.com/actions/checkout/releases/tag/v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup pnpm
        # pnpm/action-setup pinned to v4.2.0: https://github.com/pnpm/action-setup/releases/tag/v4.2.0
        uses: pnpm/action-setup@9fd676a19091d4595eefd76e4bd31c97133911f1

      - name: Setup Node.js
        # actions/setup-node pinned to v4.4.0: https://github.com/actions/setup-node/releases/tag/v4.4.0
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate required deploy secrets
        run: |
          if [ -z "${CONVEX_DEPLOY_KEY}" ]; then
            echo "::error::Missing required secret: CONVEX_DEPLOY_KEY"
            exit 1
          fi

      - name: Convex backend typecheck
        run: pnpm --filter @opencom/convex run typecheck

      - name: Show Convex CLI version
        run: pnpm --filter @opencom/convex exec convex --version

      - name: Deploy Convex production backend
        shell: bash
        run: |
          set -euo pipefail
          max_attempts=4
          attempt=1
          log_file="$(mktemp)"

          while [ "${attempt}" -le "${max_attempts}" ]; do
            echo "Starting Convex deploy attempt ${attempt}/${max_attempts}"

            if pnpm --filter @opencom/convex exec convex deploy --yes --verbose 2>&1 | tee "${log_file}"; then
              echo "Convex production deploy succeeded on attempt ${attempt}"
              exit 0
            fi

            is_transient_failure=false
            if grep -Eq '/api/deploy2/(evaluate_push|start_push)' "${log_file}" \
              && grep -Eq '(50[0-9]|502 Bad Gateway|503 Service Unavailable|504 Gateway Timeout)' "${log_file}"; then
              is_transient_failure=true
            elif grep -Eq '(ECONNRESET|ETIMEDOUT|ENOTFOUND)' "${log_file}"; then
              is_transient_failure=true
            fi

            if [ "${is_transient_failure}" = true ] && [ "${attempt}" -lt "${max_attempts}" ]; then
              backoff_seconds=$((attempt * 20))
              echo "::warning::Transient Convex deploy failure detected on attempt ${attempt}/${max_attempts}. Retrying in ${backoff_seconds}s."
              sleep "${backoff_seconds}"
              attempt=$((attempt + 1))
              continue
            fi

            if [ "${is_transient_failure}" = true ]; then
              echo "::error::Convex production deploy failed after ${max_attempts} attempts"
            else
              echo "::error::Convex production deploy failed with a non-retryable error"
            fi
            exit 1
          done
